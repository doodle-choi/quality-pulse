version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: qp-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - qp-network

  redis:
    image: redis:7.2-alpine
    container_name: qp-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - qp-network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: qp-backend-prod
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - qp-network

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: qp-frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN_NAME}/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - qp-network

  crawler:
    image: ghcr.io/${GITHUB_REPOSITORY}/crawler:latest
    container_name: qp-crawler-prod
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - qp-network

  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx:latest
    container_name: qp-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - qp-network

networks:
  qp-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
