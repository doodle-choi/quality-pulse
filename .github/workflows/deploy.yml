name: CI/CD Deployment to GCP

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://doodle-choi.me/api/v1
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/frontend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/frontend:latest

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/backend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/backend:latest

      - name: Build and push Crawler
        uses: docker/build-push-action@v5
        with:
          context: ./crawler
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/crawler:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/crawler:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/nginx:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/nginx:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy to Production Server (DigitalOcean)
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            PROJECT_DIR="$HOME/Workspace/Projects/quality-pulse"
            
            # 1. GHCR Authentication
            echo $GITHUB_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Aggressive Disk Cleanup (Crucial for small droplets)
            docker system prune -f
            
            # 3. Handle Repository Synchronization (Self-healing)
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Repo not found or broken. Re-cloning..."
              rm -rf "$PROJECT_DIR"
              mkdir -p "$(dirname "$PROJECT_DIR")"
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"
            
            # 4. Handle Branch Synchronization (Force Update)
            git config --global --add safe.directory "$PROJECT_DIR"
            git fetch --all
            git checkout -f ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # 5. Production Rollout
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
