
services:
  db:
    image: postgres:16-alpine
    container_name: quality_pulse_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qualitypulse}
    # For POC, we only allow access from within the docker network
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - qp-network

  redis:
    image: redis:7.2-alpine
    container_name: quality_pulse_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # ports:
    #   - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - qp-network

  backend:
    build: ./backend
    container_name: quality_pulse_backend
    command: >
      bash -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qualitypulse}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - qp-network

  frontend:
    build: ./frontend
    container_name: quality_pulse_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://backend:8000/api/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - qp-network

  crawler:
    build: ./crawler
    container_name: quality_pulse_crawler
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qualitypulse}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      API_BASE_URL: http://backend:8000/api/v1
      LLM_MODEL: gemini/gemini-2.5-flash
    volumes:
      - ./crawler:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - qp-network

networks:
  qp-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
